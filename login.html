<!DOCTYPE html>
<html>
<head>
<title>Login Admin</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#1e293b;padding:30px;border-radius:10px;width:300px}
input{width:100%;padding:10px;margin:10px 0}
button{width:100%;padding:10px;background:#38bdf8;border:none}
</style>
</head>
<body>

<div class="card">
<h2>Login Admin</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAen0SYv98xA-LgPCPiotZan4KugXSMAKA",
  authDomain: "perpustakaan-e9f72.firebaseapp.com",
  projectId: "perpustakaan-e9f72",
  storageBucket: "perpustakaan-e9f72.firebasestorage.app",
  messagingSenderId: "353052399818",
  appId: "1:353052399818:web:1038aa474e91642819bc33"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async () => {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location = "index.html";
  } catch {
    alert("Login gagal!");
  }
};
</script>

</body>
</html>
